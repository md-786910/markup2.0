<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#030712" />
  <meta name="author" content="Feedbackly" />

  <!-- SEO Meta Tags -->
  <title>Feedbackly — Visual Feedback Tool for Teams</title>
  <meta name="description" content="Pin comments directly on websites, PDFs, and designs. Real-time collaboration for teams. The faster, cheaper Markup.io alternative. Free forever plan." />
  <meta name="keywords" content="visual feedback tool, website feedback, design review, markup.io alternative, collaboration tool, pin comments, website annotation, bug tracking, client feedback, design collaboration" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://feedbackly.online/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Feedbackly — Visual Feedback That Actually Ships" />
  <meta property="og:description" content="Pin feedback on live websites, PDFs, and designs. Free forever plan. The faster, cheaper Markup.io alternative." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://feedbackly.online/" />
  <meta property="og:image" content="https://feedbackly.online/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Feedbackly" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Feedbackly — Visual Feedback Tool for Teams" />
  <meta name="twitter:description" content="Pin feedback directly on any website or document. Real-time collaboration. Free forever plan." />
  <meta name="twitter:image" content="https://feedbackly.online/og-image.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- DNS Prefetch for app domain -->
  <link rel="dns-prefetch" href="https://app.feedbackly.online" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Feedbackly",
    "url": "https://feedbackly.online",
    "logo": "https://feedbackly.online/og-image.png",
    "description": "Visual feedback and collaboration tool for teams. Pin comments directly on websites, PDFs, and designs."
  }
  </script>

  <!-- Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Feedbackly",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "url": "https://feedbackly.online",
    "description": "Visual feedback tool that lets teams pin comments directly on websites, PDFs, and designs. Real-time collaboration with guest review links.",
    "offers": [
      {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "name": "Free",
        "description": "3 projects, 5 team members, 2 guests — free forever"
      },
      {
        "@type": "Offer",
        "price": "12",
        "priceCurrency": "USD",
        "name": "Starter",
        "description": "15 projects, 25 team members, 10 guests, Slack integration"
      },
      {
        "@type": "Offer",
        "price": "29",
        "priceCurrency": "USD",
        "name": "Pro",
        "description": "Unlimited projects and members, Slack, Jira & Discord, version history"
      }
    ]
  }
  </script>

  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Is Feedbackly a free alternative to Markup.io?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Feedbackly offers a free forever plan with 3 projects, 5 team members, and 2 guest reviewers. Paid plans start at $12/month — compared to Markup.io's $39/month starting price. You get real-time collaboration, guest review links, and integrations with Slack, Discord, and Jira."
        }
      },
      {
        "@type": "Question",
        "name": "How does visual feedback work on a live website?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Add your website URL to Feedbackly and it loads inside our review environment. Click anywhere on the page to drop a feedback pin. Each pin is anchored to the exact element, so your feedback stays precise even when the page layout changes. Your team sees pins in real-time."
        }
      },
      {
        "@type": "Question",
        "name": "Can clients leave feedback without creating an account?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Absolutely. Generate a password-protected guest review link and share it with clients. They can view the project, drop feedback pins, and leave comments — no signup required. You control access with passwords and expiration dates."
        }
      },
      {
        "@type": "Question",
        "name": "Does Feedbackly work with PDFs and design files?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Upload PDFs and multi-page documents directly to Feedbackly. Navigate pages, drop feedback pins, and collaborate with threaded comments — the same workflow as website review, applied to documents."
        }
      },
      {
        "@type": "Question",
        "name": "What integrations does Feedbackly support?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Feedbackly integrates with Slack, Discord, and Jira. Get instant notifications when feedback is posted, and auto-create Jira issues directly from feedback pins. More integrations are on the roadmap."
        }
      },
      {
        "@type": "Question",
        "name": "How is Feedbackly different from BugHerd or Pastel?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Feedbackly combines the best of both: visual pin-based feedback like BugHerd with real-time collaboration and guest review links like Pastel. Plus, Feedbackly includes PDF review, device mode preview, and starts with a free forever plan — no 14-day trial limits."
        }
      }
    ]
  }
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
